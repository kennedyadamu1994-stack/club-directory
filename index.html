<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Discover Local Clubs | The NBRH</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Young+Serif&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
  <link rel="dns-prefetch" href="https://sheets.googleapis.com">

  <style>
    /* ══════════════════════════════════════════
       DESIGN SYSTEM — CLUB HOUSE TOKENS
    ══════════════════════════════════════════ */
    :root {
      --accent:        #FF1B6E;
      --accent-dim:    rgba(255,27,110,0.10);
      --accent-mid:    rgba(255,27,110,0.28);
      --accent-hover:  #e01560;
      --text:          #f0f0f0;
      --text-muted:    rgba(255,255,255,0.62);
      --text-faint:    rgba(255,255,255,0.32);
      --bg:            #1B1B1B;
      --bg-subtle:     #1f1f1f;
      --bg-card:       #212121;
      --bg-elevated:   #2a2a2a;
      --bg-hover:      #303030;
      --border:        rgba(255,255,255,0.08);
      --border-bright: rgba(255,255,255,0.14);
      --green:         #22c55e;
      --green-dim:     rgba(34,197,94,0.12);
      --amber:         #f59e0b;
      --amber-dim:     rgba(245,158,11,0.12);
      --font-serif:    'Young Serif', Georgia, serif;
      --font-sans:     'DM Sans', -apple-system, sans-serif;
      --r:             3px;
      --r-lg:          8px;
      --shadow-md:     0 4px 20px rgba(0,0,0,0.6);
      --shadow-lg:     0 8px 32px rgba(0,0,0,0.7);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background: var(--bg); color: var(--text);
      line-height: 1.5; -webkit-font-smoothing: antialiased; overflow-x: hidden;
    }

    ::-webkit-scrollbar { width: 2px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }

    /* ══════════════════════════════════════════
       NAV
    ══════════════════════════════════════════ */
    .site-nav {
      position: sticky; top: 0;
      background: rgba(27,27,27,0.97);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border); z-index: 9999;
    }
    .nav-inner {
      max-width: 1400px; margin: 0 auto; padding: 0.85rem 2rem;
      display: flex; align-items: center; justify-content: space-between; gap: 1rem;
    }
    .nav-brand {
      display: flex; align-items: center; gap: 0.65rem;
      text-decoration: none; flex-shrink: 0;
    }
    .nav-brand-logo { height: 32px; object-fit: contain; }
    .nav-brand-name { font-family: var(--font-serif); font-size: 1rem; color: var(--text); line-height: 1.15; }
    .nav-brand-name small {
      display: block; font-family: var(--font-sans); font-size: 0.55rem;
      font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-faint);
    }
    .nav-links {
      display: flex; list-style: none; gap: 0; align-items: center;
      overflow-x: auto; scrollbar-width: none;
    }
    .nav-links::-webkit-scrollbar { display: none; }
    .nav-links a {
      color: var(--text-muted); text-decoration: none; font-size: 0.75rem;
      font-weight: 500; letter-spacing: 0.03em; padding: 0.4rem 0.75rem;
      white-space: nowrap; transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--accent); }
    .nav-links .nav-cta a {
      background: var(--accent); color: #fff !important;
      border-radius: var(--r); font-weight: 600; padding: 0.45rem 1rem;
    }
    .nav-links .nav-cta a:hover { opacity: 0.88; }

    /* ══════════════════════════════════════════
       PAGE HEADER
    ══════════════════════════════════════════ */
    .page-header {
      border-bottom: 1px solid var(--border); padding: 3.5rem 2rem 3rem;
      background: var(--bg-subtle); position: relative; overflow: hidden;
    }
    .page-header::before {
      content: 'Clubs'; position: absolute; right: -0.04em; bottom: -0.15em;
      font-family: var(--font-serif); font-size: clamp(6rem, 18vw, 14rem);
      color: rgba(255,27,110,0.04); line-height: 1; pointer-events: none; user-select: none;
    }
    .page-header-inner { max-width: 1400px; margin: 0 auto; position: relative; z-index: 1; }
    .eyebrow {
      font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.16em; color: var(--accent); display: block; margin-bottom: 0.5rem;
    }
    .page-header h1 {
      font-family: var(--font-serif); font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: normal; line-height: 1.05; letter-spacing: -0.02em;
      color: var(--text); margin-bottom: 0.65rem;
    }
    .page-header h1 em { color: var(--accent); font-style: normal; }
    .page-header p { font-size: 0.9rem; color: var(--text-muted); max-width: 50ch; line-height: 1.65; }

    /* ══════════════════════════════════════════
       LOADING / ERROR
    ══════════════════════════════════════════ */
    .state-wrap { max-width: 1400px; margin: 3rem auto; padding: 0 2rem; text-align: center; }
    .spinner {
      width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.75s linear infinite; margin: 0 auto 0.85rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 0.82rem; color: var(--text-faint); font-weight: 500; }
    .error-box {
      background: var(--bg-card); border: 1px solid rgba(239,68,68,0.3);
      border-radius: var(--r-lg); padding: 1.5rem; color: #ef4444; font-size: 0.875rem;
    }
    .error-box p { margin-bottom: 1rem; }

    /* ══════════════════════════════════════════
       MAIN CONTENT SHELL
    ══════════════════════════════════════════ */
    .content-shell { max-width: 1400px; margin: 0 auto; padding: 2rem; }

    /* ══════════════════════════════════════════
       SEARCH
    ══════════════════════════════════════════ */
    .search-wrap { position: relative; max-width: 680px; margin-bottom: 1.5rem; }
    .search-icon {
      position: absolute; left: 0.9rem; top: 50%; transform: translateY(-50%);
      color: var(--text-faint); font-size: 0.95rem; pointer-events: none;
    }
    .search-input {
      width: 100%; padding: 0.7rem 2.5rem 0.7rem 2.5rem;
      background: var(--bg-elevated); border: 1px solid var(--border);
      border-radius: var(--r-lg); color: var(--text); font-family: var(--font-sans);
      font-size: 0.9rem; transition: border-color 0.2s, box-shadow 0.2s;
      appearance: none; -webkit-appearance: none; outline: none;
    }
    .search-input::placeholder { color: var(--text-faint); }
    .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }

    /* ══════════════════════════════════════════
       TOOLBAR
    ══════════════════════════════════════════ */
    .toolbar { display: flex; align-items: center; gap: 0.65rem; flex-wrap: wrap; margin-bottom: 1.75rem; }
    .btn {
      display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.6rem 1rem;
      background: var(--bg-elevated); border: 1px solid var(--border-bright);
      border-radius: var(--r); color: var(--text-muted); font-family: var(--font-sans);
      font-size: 0.75rem; font-weight: 500; cursor: pointer; transition: all 0.18s;
      text-decoration: none; white-space: nowrap; line-height: 1;
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .result-count { margin-left: auto; font-size: 0.75rem; color: var(--text-faint); font-weight: 500; }

    /* ══════════════════════════════════════════
       CARDS GRID
    ══════════════════════════════════════════ */
    .cards-grid {
      display: grid; gap: 1.1rem;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      align-items: start;
    }

    /* ══════════════════════════════════════════
       CARD
    ══════════════════════════════════════════ */
    .club-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--r-lg); overflow: hidden; display: flex; flex-direction: column;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    }
    .club-card:hover { border-color: var(--border-bright); transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .club-card.featured { border-top: 3px solid var(--amber); }
    .club-card.featured:hover { border-color: rgba(245,158,11,0.4); }

    /* Image */
    .card-img-wrap { position: relative; width: 100%; height: 190px; overflow: hidden; background: var(--bg-elevated); }
    .card-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; display: block; }
    .club-card:hover .card-img { transform: scale(1.04); }

    /* Image overlay */
    .card-overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.82) 0%, transparent 100%);
      padding: 0.6rem 0.75rem;
      display: flex; justify-content: space-between; align-items: flex-end; z-index: 2;
    }
    .overlay-pill {
      background: rgba(27,27,27,0.9); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      padding: 3px 9px; border-radius: var(--r); font-size: 0.75rem;
      font-family: var(--font-serif); color: #fff; line-height: 1.3;
    }
    .overlay-pill.accent { background: rgba(255,27,110,0.88); }
    .overlay-pill.amber  { background: rgba(245,158,11,0.88); }

    /* Confidence overlay pill colours */
    .overlay-pill.conf-verified    { background: rgba(0,128,0,0.9); }
    .overlay-pill.conf-likely      { background: rgba(34,139,34,0.9); }
    .overlay-pill.conf-probably    { background: rgba(202,138,4,0.9); }
    .overlay-pill.conf-uncertain   { background: rgba(234,88,12,0.9); }
    .overlay-pill.conf-unconfirmed { background: rgba(185,28,28,0.9); }

    /* Top badges */
    .card-badge {
      position: absolute; top: 10px; z-index: 3;
      padding: 3px 9px; border-radius: var(--r);
      font-size: 0.62rem; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase;
    }
    .card-badge.left  { left: 10px; }
    .card-badge.right { right: 10px; left: auto; }
    .badge-accent { background: var(--accent); color: #fff; }
    .badge-white  { background: rgba(255,255,255,0.95); color: #1B1B1B; }
    .badge-amber  { background: var(--amber); color: #1B1B1B; }

    /* Card body */
    .card-body { padding: 0.9rem 1rem; display: flex; flex-direction: column; gap: 0.4rem; flex: 1; }
    .card-title {
      font-family: var(--font-serif); font-size: 1.05rem; color: var(--text);
      line-height: 1.25; font-weight: normal; display: flex; align-items: center; gap: 0.4rem;
    }
    .verified-dot {
      display: inline-flex; align-items: center; justify-content: center;
      width: 16px; height: 16px; background: var(--accent); border-radius: 50%; flex-shrink: 0;
    }
    .verified-dot svg { width: 10px; height: 10px; fill: #fff; }
    .card-activity { font-size: 0.8rem; font-weight: 600; color: var(--accent); letter-spacing: 0.02em; }
    .card-location { font-size: 0.75rem; color: var(--text-faint); }
    .card-meta { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.1rem; }
    .meta-chip {
      display: inline-flex; align-items: center; background: var(--bg-elevated);
      border: 1px solid var(--border); padding: 2px 8px; border-radius: 20px;
      font-size: 0.68rem; font-weight: 500; color: var(--text-muted);
    }
    .meta-chip.green  { background: var(--green-dim); border-color: rgba(34,197,94,0.2); color: var(--green); }
    .meta-chip.amber  { background: var(--amber-dim); border-color: rgba(245,158,11,0.2); color: var(--amber); }
    .meta-chip.accent { background: var(--accent-dim); border-color: var(--accent-mid);   color: var(--accent); }

    /* Stats row */
    .stats-row {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; margin: 0.5rem 0 0.25rem;
    }
    .stat-box {
      background: var(--bg-elevated); border: 1px solid var(--border);
      border-radius: var(--r); padding: 0.5rem 0.6rem; text-align: center;
    }
    .stat-val {
      font-family: var(--font-serif); font-size: 1rem; color: var(--text);
      line-height: 1; font-weight: normal; display: block;
    }
    .stat-lbl {
      font-size: 0.6rem; color: var(--text-faint); margin-top: 2px;
      font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; display: block;
    }

    /* Card footer */
    .card-footer { padding: 0.75rem 1rem; border-top: 1px solid var(--border); }
    .cta-btn {
      display: flex; align-items: center; justify-content: center; width: 100%;
      padding: 0.65rem 1rem; background: var(--accent); border: 1px solid var(--accent);
      border-radius: var(--r); color: #fff; font-family: var(--font-sans);
      font-size: 0.78rem; font-weight: 600; text-decoration: none;
      cursor: pointer; transition: all 0.18s; line-height: 1;
    }
    .cta-btn:hover { background: var(--accent-hover); border-color: var(--accent-hover); }

    /* ══════════════════════════════════════════
       EMPTY STATE
    ══════════════════════════════════════════ */
    .empty-state { text-align: center; padding: 4rem 2rem; color: var(--text-muted); }
    .empty-state h3 { font-family: var(--font-serif); font-size: 1.3rem; color: var(--text); margin-bottom: 0.4rem; font-weight: normal; }
    .empty-state p { font-size: 0.875rem; }

    /* ══════════════════════════════════════════
       MODALS
    ══════════════════════════════════════════ */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      z-index: 99999; display: none; align-items: center; justify-content: center;
      padding: 1.5rem; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }
    .modal-overlay.active { display: flex; }
    .modal-box {
      background: var(--bg-card); border: 1px solid var(--border-bright);
      border-top: 3px solid var(--accent); border-radius: var(--r-lg);
      width: 100%; max-width: 480px; max-height: 88vh;
      overflow-y: auto; box-shadow: var(--shadow-lg); position: relative;
    }
    .modal-header {
      position: sticky; top: 0; background: var(--bg-card);
      border-bottom: 1px solid var(--border); padding: 1.1rem 1.4rem;
      display: flex; align-items: center; justify-content: space-between; z-index: 1;
    }
    .modal-title { font-family: var(--font-serif); font-size: 1.1rem; color: var(--text); font-weight: normal; padding-right: 2rem; }
    .modal-close {
      position: absolute; top: 0.9rem; right: 1rem; background: none;
      border: 1px solid var(--border); border-radius: var(--r); width: 28px; height: 28px;
      color: var(--text-faint); cursor: pointer; font-size: 0.9rem;
      display: flex; align-items: center; justify-content: center; transition: all 0.15s;
    }
    .modal-close:hover { border-color: var(--accent); color: var(--accent); }
    .modal-body { padding: 1.1rem 1.4rem; }

    .filter-field { display: flex; flex-direction: column; gap: 0.35rem; margin-bottom: 0.9rem; }
    .filter-label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-faint); }
    .filter-select, .filter-input {
      padding: 0.6rem 0.8rem; background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--r-lg); color: var(--text); font-family: var(--font-sans);
      font-size: 0.875rem; transition: border-color 0.18s;
      appearance: none; -webkit-appearance: none; outline: none; width: 100%;
    }
    .filter-select:focus, .filter-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
    .filter-select option { background: #2a2a2a; }
    .filter-check {
      display: flex; align-items: center; gap: 0.5rem; font-size: 0.82rem;
      color: var(--text-muted); cursor: pointer; margin-bottom: 0.5rem;
    }
    .filter-check input[type="checkbox"] { accent-color: var(--accent); width: 14px; height: 14px; }
    .price-row { display: flex; gap: 0.5rem; }
    .price-row .filter-input { flex: 1; }

    .adv-toggle {
      width: 100%; padding: 0.6rem 0.8rem; background: var(--bg-elevated);
      border: 1px solid var(--border); border-radius: var(--r); color: var(--text-muted);
      font-family: var(--font-sans); font-size: 0.75rem; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; justify-content: space-between;
      gap: 0.5rem; transition: all 0.18s; margin-bottom: 0; text-align: left;
    }
    .adv-toggle:hover { border-color: var(--accent); color: var(--accent); }
    .adv-toggle-icon { transition: transform 0.3s; font-size: 0.65rem; }
    .adv-toggle.open .adv-toggle-icon { transform: rotate(180deg); }
    .adv-section { overflow: hidden; max-height: 0; opacity: 0; transition: max-height 0.38s ease, opacity 0.28s ease; }
    .adv-section.open { max-height: 600px; opacity: 1; }
    .adv-section-inner { padding-top: 1rem; margin-top: 0.75rem; border-top: 1px solid var(--border); }

    .modal-footer {
      padding: 0.9rem 1.4rem; border-top: 1px solid var(--border); display: flex; gap: 0.5rem;
    }
    .modal-footer .btn { flex: 1; justify-content: center; }

    /* ══════════════════════════════════════════
       TOAST
    ══════════════════════════════════════════ */
    #nbrh-toast {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      background: var(--bg-elevated); border: 1px solid var(--border-bright);
      border-radius: var(--r-lg); padding: 0.8rem 1.2rem;
      font-size: 0.82rem; font-weight: 600; color: var(--text); font-family: var(--font-sans);
      box-shadow: var(--shadow-lg); z-index: 999999;
      transform: translateY(10px); opacity: 0; transition: all 0.25s ease;
      max-width: 300px; display: flex; align-items: center; gap: 0.5rem; pointer-events: none;
    }
    #nbrh-toast.show { transform: translateY(0); opacity: 1; pointer-events: auto; }
    #nbrh-toast.success { border-left: 3px solid var(--green); }
    #nbrh-toast.error   { border-left: 3px solid #ef4444; }

    /* ══════════════════════════════════════════
       RESPONSIVE
    ══════════════════════════════════════════ */
    @media (max-width: 768px) {
      .nav-inner { padding: 0.85rem 1.25rem; }
      .page-header { padding: 2.5rem 1.25rem 2rem; }
      .content-shell { padding: 1.5rem 1.25rem; }
      .cards-grid { grid-template-columns: 1fr; }
      .result-count { margin-left: 0; flex-basis: 100%; text-align: center; }
      .nav-brand-name small { display: none; }
    }
  </style>
</head>

<body>

  <!-- NAV -->
  <nav class="site-nav">
    <div class="nav-inner">
      <a href="https://www.thenbrh.co.uk/" class="nav-brand">
        <img class="nav-brand-logo"
          src="https://images.squarespace-cdn.com/content/6718416feaa24175e29324d4/9d6e6464-e1e5-4dde-9ae0-03df420cbd77/NBRH+Logo.png?content-type=image%2Fpng"
          alt="The NBRH" onerror="this.style.display='none'">
        <div class="nav-brand-name">The NBRH <small>Club Directory</small></div>
      </a>
      <ul class="nav-links">
        <li><a href="/">Browse Clubs</a></li>
      </ul>
    </div>
  </nav>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <div class="page-header-inner">
      <span class="eyebrow">Discover</span>
      <h1>Find your <em>local club.</em></h1>
      <p>Browse community sport and fitness clubs across London. Filter by activity, location or price to find your fit.</p>
    </div>
  </div>

  <!-- LOADING -->
  <div id="loading-state" class="state-wrap">
    <div class="spinner"></div>
    <p class="loading-text">Loading clubs…</p>
  </div>

  <!-- ERROR -->
  <div id="error-state" class="state-wrap" style="display:none;">
    <div class="error-box">
      <p>Failed to load clubs. Check your connection or try again.</p>
      <button class="btn primary" onclick="window.location.reload()">Try Again</button>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main-content" style="display:none;">
    <div class="content-shell">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" class="search-input" id="searchInput"
          placeholder="Search clubs by name, activity, or location…" autocomplete="off">
      </div>
      <div class="toolbar">
        <button class="btn primary" id="open-filter">Filter Clubs</button>
        <button class="btn" id="open-sort">Sort</button>
        <button class="btn" id="reload">Refresh Data</button>
        <span class="result-count" id="result-count"></span>
      </div>
      <div id="cards" class="cards-grid" aria-live="polite"></div>
    </div>
  </div>

  <!-- FILTER MODAL -->
  <div id="filter-modal" class="modal-overlay" aria-modal="true" role="dialog">
    <div class="modal-box">
      <div class="modal-header">
        <h2 class="modal-title">Filter Clubs</h2>
        <button class="modal-close" id="filter-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="filter-field">
          <label class="filter-label" for="f-activity">Activity Type</label>
          <select class="filter-select" id="f-activity"><option value="">Any activity</option></select>
        </div>
        <div class="filter-field">
          <label class="filter-label" for="f-location">Location</label>
          <select class="filter-select" id="f-location"><option value="">Any location</option></select>
        </div>
        <div class="filter-field">
          <label class="filter-label">Monthly fee (£)</label>
          <div class="price-row">
            <input type="number" class="filter-input" id="f-pmin" placeholder="Min" min="0" value="0">
            <input type="number" class="filter-input" id="f-pmax" placeholder="Max" min="0">
          </div>
        </div>
        <!-- Confidence filter -->
        <div class="filter-field">
          <label class="filter-label" for="f-confidence">Confidence</label>
          <select class="filter-select" id="f-confidence">
            <option value="">Any confidence</option>
            <option value="Verified">Verified</option>
            <option value="Likely Active">Likely Active</option>
            <option value="Probably Active">Probably Active</option>
            <option value="Uncertain">Uncertain</option>
            <option value="Unconfirmed">Unconfirmed</option>
          </select>
        </div>
        <label class="filter-check"><input type="checkbox" id="f-beginners"> Beginner friendly</label>
        <label class="filter-check"><input type="checkbox" id="f-verified"> Verified clubs only</label>
        <label class="filter-check"><input type="checkbox" id="f-featured"> Featured clubs only</label>

        <button class="adv-toggle" id="toggle-advanced">
          <span>Advanced filters</span>
          <span class="adv-toggle-icon">▼</span>
        </button>
        <div class="adv-section" id="adv-section">
          <div class="adv-section-inner">
            <div class="filter-field">
              <label class="filter-label" for="f-ages">Age Groups</label>
              <select class="filter-select" id="f-ages"><option value="">Any age group</option></select>
            </div>
            <div class="filter-field">
              <label class="filter-label" for="f-skills">Skill Levels</label>
              <select class="filter-select" id="f-skills"><option value="">Any skill level</option></select>
            </div>
            <div class="filter-field">
              <label class="filter-label" for="f-members">Minimum members</label>
              <select class="filter-select" id="f-members">
                <option value="">Any size</option>
                <option value="50">50+ members</option>
                <option value="100">100+ members</option>
                <option value="200">200+ members</option>
              </select>
            </div>
            <label class="filter-check"><input type="checkbox" id="f-wheelchair"> Wheelchair accessible</label>
            <label class="filter-check"><input type="checkbox" id="f-all-ages"> All ages welcome</label>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn" id="f-reset">Reset all</button>
        <button class="btn primary" id="f-apply">Apply</button>
      </div>
    </div>
  </div>

  <!-- SORT MODAL -->
  <div id="sort-modal" class="modal-overlay" aria-modal="true" role="dialog">
    <div class="modal-box">
      <div class="modal-header">
        <h2 class="modal-title">Sort clubs by</h2>
        <button class="modal-close" id="sort-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="filter-field">
          <label class="filter-label" for="s-key">Sort order</label>
          <select class="filter-select" id="s-key">
            <option value="default">Default (Featured → Confidence → Members)</option>
            <option value="ranking">Ranking position (best → worst)</option>
            <option value="confidence">Confidence (Verified → Unconfirmed)</option>
            <option value="members">Member count (high → low)</option>
            <option value="priceLow">Price (low → high)</option>
            <option value="priceHigh">Price (high → low)</option>
            <option value="name">Name (A → Z)</option>
            <option value="location">Location (A → Z)</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn" id="s-close">Cancel</button>
        <button class="btn primary" id="s-apply">Apply</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="nbrh-toast"></div>

<script>
(function(){
  /* ════════════════════════════════════════
     CONFIDENCE HELPERS
     Labels match exactly what's stored in the sheet's "Confidence Score" column.
  ════════════════════════════════════════ */
  const CONFIDENCE_ORDER = ['Verified','Likely Active','Probably Active','Uncertain','Unconfirmed'];

  // Numeric priority for sorting — lower index = higher confidence
  function getConfidencePriority(label) {
    const idx = CONFIDENCE_ORDER.indexOf(label || '');
    return idx === -1 ? CONFIDENCE_ORDER.length : idx;
  }

  // CSS class suffix for overlay pill
  function confidenceClass(label) {
    switch (label) {
      case 'Verified':        return 'conf-verified';
      case 'Likely Active':   return 'conf-likely';
      case 'Probably Active': return 'conf-probably';
      case 'Uncertain':       return 'conf-uncertain';
      case 'Unconfirmed':     return 'conf-unconfirmed';
      default:                return '';
    }
  }

  /* ════════════════════════════════════════
     ELEMENTS
  ════════════════════════════════════════ */
  const $ = id => document.getElementById(id);

  const els = {
    loading:     $('loading-state'),
    error:       $('error-state'),
    main:        $('main-content'),
    cards:       $('cards'),
    result:      $('result-count'),
    search:      $('searchInput'),
    filterOpen:  $('open-filter'),
    sortOpen:    $('open-sort'),
    reloadBtn:   $('reload'),
    filterModal: $('filter-modal'),
    sortModal:   $('sort-modal'),
    filterClose: $('filter-close'),
    sortClose:   $('sort-close'),
    advToggle:   $('toggle-advanced'),
    advSection:  $('adv-section'),
    fActivity:   $('f-activity'),
    fLocation:   $('f-location'),
    fMin:        $('f-pmin'),
    fMax:        $('f-pmax'),
    fConfidence: $('f-confidence'),
    fBeginners:  $('f-beginners'),
    fVerified:   $('f-verified'),
    fFeatured:   $('f-featured'),
    fAges:       $('f-ages'),
    fSkills:     $('f-skills'),
    fMembers:    $('f-members'),
    fWheel:      $('f-wheelchair'),
    fAllAges:    $('f-all-ages'),
    fReset:      $('f-reset'),
    fApply:      $('f-apply'),
    sKey:        $('s-key'),
    sClose:      $('s-close'),
    sApply:      $('s-apply'),
    toast:       $('nbrh-toast'),
  };

  /* ════════════════════════════════════════
     STATE
  ════════════════════════════════════════ */
  let RAW  = [];
  let VIEW = [];
  let SORT = 'default';

  /* ════════════════════════════════════════
     TOAST
  ════════════════════════════════════════ */
  function showToast(msg, type = 'success') {
    els.toast.textContent = msg;
    els.toast.className = type + ' show';
    setTimeout(() => els.toast.classList.remove('show'), 3000);
  }

  /* ════════════════════════════════════════
     HELPERS
  ════════════════════════════════════════ */
  const checkSVG = '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>';

  function money(n) {
    const v = Number(n);
    return (isFinite(v) && v > 0) ? '£' + (Math.round(v * 100) / 100).toFixed(v % 1 ? 2 : 0) : '';
  }

  function getPriceForSort(c) {
    const amount = Number(c.monthly_fee_amount);
    if (isFinite(amount) && amount > 0) return amount;
    const text = String(c.monthly_fee_text || '').toLowerCase();
    if (text.includes('free') || text.includes('varies')) return 0;
    const match = text.match(/£?(\d+(?:\.\d+)?)/);
    return match ? Number(match[1]) : 0;
  }

  function uniqueSorted(arr) {
    return [...new Set(arr.filter(Boolean))].sort((a, b) => a.localeCompare(b));
  }

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = String(str || '');
    return d.innerHTML;
  }

  /* ════════════════════════════════════════
     MODALS
  ════════════════════════════════════════ */
  function openModal(el)  { el.classList.add('active');    document.body.style.overflow = 'hidden'; }
  function closeModal(el) { el.classList.remove('active'); document.body.style.overflow = ''; }
  function closeAll()     { closeModal(els.filterModal); closeModal(els.sortModal); }

  els.filterClose.addEventListener('click', closeAll);
  els.sortClose.addEventListener('click',   closeAll);
  els.sClose.addEventListener('click',      closeAll);
  [els.filterModal, els.sortModal].forEach(m => {
    m.addEventListener('click', e => { if (e.target === m) closeAll(); });
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeAll(); });
  els.filterOpen.addEventListener('click', () => openModal(els.filterModal));
  els.sortOpen.addEventListener('click',   () => openModal(els.sortModal));

  /* Advanced toggle */
  els.advToggle.addEventListener('click', () => {
    els.advToggle.classList.toggle('open');
    els.advSection.classList.toggle('open');
  });

  /* ════════════════════════════════════════
     POPULATE FILTER OPTIONS
  ════════════════════════════════════════ */
  function populateFilters(list) {
    const acts   = uniqueSorted(list.map(x => x.activity_type));
    const locs   = uniqueSorted(list.map(x => x.location));
    const ages   = uniqueSorted(list.map(x => x.age_groups || x.tags_who));
    const skills = uniqueSorted(list.map(x => x.skill_levels));

    const fill = (sel, opts) => {
      const keep = sel.options[0].outerHTML;
      sel.innerHTML = keep + opts.map(o => `<option value="${esc(o)}">${esc(o)}</option>`).join('');
    };
    fill(els.fActivity, acts);
    fill(els.fLocation, locs);
    fill(els.fAges,     ages);
    fill(els.fSkills,   skills);
    // Confidence filter options are static (defined in HTML) — no population needed
  }

  /* ════════════════════════════════════════
     FILTER + SORT
  ════════════════════════════════════════ */
  function applyFilters() {
    const q    = els.search.value.trim().toLowerCase();
    const minP = Number(els.fMin.value || 0);
    const maxP = Number(els.fMax.value || 0) || Infinity;
    const confFilter = els.fConfidence.value;

    VIEW = RAW.filter(c => {
      if (q) {
        const blob = [c.club_name, c.activity_type, c.location, c.audience].join(' ').toLowerCase();
        if (!blob.includes(q)) return false;
      }
      if (els.fActivity.value && c.activity_type !== els.fActivity.value) return false;
      if (els.fLocation.value && c.location !== els.fLocation.value) return false;
      if (els.fVerified.checked && !c.verified) return false;
      if (els.fFeatured.checked && !c.featured) return false;

      // Confidence filter — exact string match
      if (confFilter && c.confidence_score !== confFilter) return false;

      const price = Number(c.monthly_fee_amount || 0);
      if (price && price < minP) return false;
      if (isFinite(maxP) && price > maxP) return false;

      if (els.fBeginners.checked && !String(c.tags_who || '').toLowerCase().includes('beginner')) return false;
      if (els.fAges.value && !String(c.age_groups || '').includes(els.fAges.value)) return false;
      if (els.fSkills.value && c.skill_levels && c.skill_levels !== 'All levels' && c.skill_levels !== els.fSkills.value) return false;
      if (els.fMembers.value && Number(c.member_count || 0) < Number(els.fMembers.value)) return false;
      if (els.fWheel.checked && !c.is_wheelchair_accessible) return false;
      if (els.fAllAges.checked && !c.is_all_ages) return false;

      return true;
    });

    applySortAndRender();
  }

  function applySortAndRender() {
    const sorted = [...VIEW];
    const getNum = v => { const n = Number(v); return isFinite(n) ? n : 0; };

    sorted.sort((a, b) => {
      switch (SORT) {
        case 'confidence':
          // Verified (priority 0) sorts before Unconfirmed (priority 4)
          return getConfidencePriority(a.confidence_score) - getConfidencePriority(b.confidence_score);
        case 'members':
          return getNum(b.member_count) - getNum(a.member_count);
        case 'priceLow':
          return getPriceForSort(a) - getPriceForSort(b);
        case 'priceHigh':
          return getPriceForSort(b) - getPriceForSort(a);
        case 'name':
          return String(a.club_name || '').localeCompare(String(b.club_name || ''));
        case 'location':
          return String(a.location || '').localeCompare(String(b.location || ''));
        case 'ranking':
          return getNum(a.ranking_position || 9999) - getNum(b.ranking_position || 9999);
        default: {
          // Featured first, then confidence (Verified before Unconfirmed), then members
          const fd = (b.featured ? 1 : 0) - (a.featured ? 1 : 0);
          if (fd) return fd;
          const cd = getConfidencePriority(a.confidence_score) - getConfidencePriority(b.confidence_score);
          if (cd) return cd;
          return getNum(b.member_count) - getNum(a.member_count);
        }
      }
    });

    renderCards(sorted);
  }

  /* ════════════════════════════════════════
     RENDER
  ════════════════════════════════════════ */
  function cardHtml(c) {
    const img  = c.image_url || 'https://images.unsplash.com/photo-1552667466-07770ae110d0?auto=format&fit=crop&w=1200&q=80';
    const price = c.monthly_fee_amount ? `${money(c.monthly_fee_amount)}/mo` : (c.monthly_fee_text || '');
    const isFree = !price || /free/i.test(price);
    const code  = c.club_code || '';
    const conf  = c.confidence_score || '';
    const confCls = confidenceClass(conf);

    /* Chips */
    const chips = [];
    if (String(c.tags_who || '').toLowerCase().includes('beginner'))
      chips.push(`<span class="meta-chip green">Beginner friendly</span>`);
    if (c.is_wheelchair_accessible)
      chips.push(`<span class="meta-chip accent">Accessible</span>`);
    if (c.is_all_ages)
      chips.push(`<span class="meta-chip amber">All ages</span>`);
    if (c.audience)
      chips.push(`<span class="meta-chip">${esc(c.audience)}</span>`);

    return `
      <article class="club-card${c.featured ? ' featured' : ''}">
        <div class="card-img-wrap">
          ${c.featured ? `<span class="card-badge left badge-amber">★ Featured</span>` : ''}
          ${c.verified ? `<span class="card-badge right badge-accent">Verified</span>` : ''}
          <img class="card-img" loading="lazy" src="${esc(img)}" alt="${esc(c.club_name || 'Club')}"
            onerror="this.src='https://images.unsplash.com/photo-1552667466-07770ae110d0?auto=format&fit=crop&w=1200&q=80'">
          <div class="card-overlay">
            <div class="overlay-pill${isFree ? ' green' : ' accent'}">${esc(price || 'Free / varies')}</div>
            ${conf && confCls
              ? `<div class="overlay-pill ${confCls}">${esc(conf)}</div>`
              : ''}
          </div>
        </div>

        <div class="card-body">
          <h3 class="card-title">
            ${esc(c.club_name || 'Unknown Club')}
            ${c.verified ? `<span class="verified-dot">${checkSVG}</span>` : ''}
          </h3>
          ${c.activity_type ? `<div class="card-activity">${esc(c.activity_type)}</div>` : ''}
          ${c.location ? `<div class="card-location">📍 ${esc(c.location)}</div>` : ''}

          <div class="stats-row">
            <div class="stat-box">
              <span class="stat-val">${c.sessions_per_week || 0}</span>
              <span class="stat-lbl">Sessions/Wk</span>
            </div>
            <div class="stat-box">
              <span class="stat-val">${c.member_count || 0}</span>
              <span class="stat-lbl">Members</span>
            </div>
            <div class="stat-box">
              <span class="stat-val">${c.ranking_position ? '#' + c.ranking_position : '—'}</span>
              <span class="stat-lbl">Rank</span>
            </div>
          </div>

          ${chips.length ? `<div class="card-meta">${chips.join('')}</div>` : ''}
        </div>

        <div class="card-footer">
          <a class="cta-btn" href="/club/${esc(code)}" aria-label="View details for ${esc(c.club_name)}">
            View details →
          </a>
        </div>
      </article>
    `;
  }

  function renderCards(list) {
    if (!list.length) {
      els.cards.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1;">
          <h3>No clubs found</h3>
          <p>Try adjusting your search or filters.</p>
        </div>`;
    } else {
      els.cards.innerHTML = list.map(cardHtml).join('');
    }
    els.result.textContent = `${list.length} result${list.length === 1 ? '' : 's'}`;
  }

  /* ════════════════════════════════════════
     DATA LOAD
  ════════════════════════════════════════ */
  function resetFilters() {
    els.fActivity.value  = '';
    els.fLocation.value  = '';
    els.fMin.value       = '0';
    els.fMax.value       = '';
    els.fConfidence.value = '';
    els.fBeginners.checked = false;
    els.fVerified.checked  = false;
    els.fFeatured.checked  = false;
    els.fAges.value    = '';
    els.fSkills.value  = '';
    els.fMembers.value = '';
    els.fWheel.checked    = false;
    els.fAllAges.checked  = false;
  }

  async function loadData() {
    try {
      els.loading.style.display = '';
      els.error.style.display   = 'none';
      els.main.style.display    = 'none';

      const res  = await fetch(`/api/clubs?t=${Date.now()}`, { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();

      RAW = Array.isArray(data) ? data : [];
      populateFilters(RAW);
      resetFilters();
      els.search.value = '';
      SORT = 'default';
      els.sKey.value = 'default';

      applyFilters();

      els.loading.style.display = 'none';
      els.main.style.display    = '';
    } catch (err) {
      console.error(err);
      els.loading.style.display = 'none';
      els.error.style.display   = '';
    }
  }

  /* ════════════════════════════════════════
     EVENTS
  ════════════════════════════════════════ */
  let searchTimer;
  els.search.addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(applyFilters, 260);
  });

  els.reloadBtn.addEventListener('click', () => { loadData(); showToast('Data refreshed'); });
  els.fApply.addEventListener('click', () => { closeAll(); applyFilters(); });
  els.fReset.addEventListener('click', () => { resetFilters(); closeAll(); applyFilters(); });
  els.sApply.addEventListener('click', () => { SORT = els.sKey.value || 'default'; closeAll(); applySortAndRender(); });

  /* ════════════════════════════════════════
     INIT
  ════════════════════════════════════════ */
  loadData();

})();
</script>

</body>
</html>
